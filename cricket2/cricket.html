            let gameSummary = {

             loss:0,
             draw:0,
            }
            function computerChoice(){
                let computerChoice;
                computerChoice=Math.floor(Math.random()*3);
                if(computerChoice==0){
                    return 'rock';
                }else if(computerChoice==1){
                        return'paper';
                }else if(computerChoice==2){
                    return 'scissor';
                }  
            }
            function matchResult(userChoice,computerChoice){
                if(userChoice==='rock'){
                    if(computerChoice==='rock'){
                        gameSummary.draw++; 
                        alert('match is draw, ' +'your choice is : '+userChoice+' , computer choice is : '+ computerChoice +'\n'+JSON.stringify(gameSummary));
                    }else if(computerChoice==='paper'){
                        gameSummary.loss++;
                        alert('you loss, ' +'your choice is : '+userChoice+' , computer choice is : '+ computerChoice +'\n'+JSON.stringify(gameSummary));
                                               
                    }else if(computerChoice==='scissor'){
                          gameSummary.win++;
                        alert ('you won, '  +'your choice is : '+userChoice+' , computer choice is : '+ computerChoice +'\n'+JSON.stringify(gameSummary))                  
                    }
                }else if(userChoice==='paper'){
                     if(computerChoice==='rock'){
                          gameSummary.win++;
                       alert('you won, ' +'your choice is : '+userChoice+' , computer choice is : '+ computerChoice +'\n'+JSON.stringify(gameSummary));

                         gameSummary.draw++;

                       alert('you loss, ' +'your choice is : '+userChoice+' , computer choice is : '+ computerChoice +'\n'+JSON.stringify(gameSummary));

                }else if(userChoice==='scissor'){
                     if(computerChoice==='rock'){

                        gameSummary.draw++;
                        alert('Match is draw, ' +'your choice is : '+userChoice+' , computer choice is : '+ computerChoice +'\n'+JSON.stringify(gameSummary));
